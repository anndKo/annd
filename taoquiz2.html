<script>
function taoBieuMau(){
    const soCau = document.getElementById("soCau").value.trim();
    const monHoc = document.getElementById("monHoc").value.trim();
    let output = document.getElementById("mauOutput");

    if(!soCau || !monHoc){
        output.innerHTML = "<div style='color:red;'>⚠️ Vui lòng nhập đủ thông tin!</div>";
        return;
    }

    let text =
`Tạo cho tôi ${soCau} câu hỏi môn ${monHoc} dạng trắc nghiệm như sau:
A.
B.
C.
D.
Đáp án:`;   

    output.innerHTML = `
        <div id="mauText" style="
            background:#f6f8fb;
            padding:12px;
            border-left:5px solid #2c7aed;
            border-radius:6px;
            color:black;
            white-space: pre-line;
        ">${text}</div>

        <button id="copyBtn" style="
            margin-top:8px;
            padding:6px 12px;
            background:#2c7aed;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
            font-size:16px;
        ">📋 Sao chép văn bản</button>
    `;

    document.getElementById("copyBtn").onclick = function(){
        const textToCopy = document.getElementById("mauText").textContent;

        // Thử dùng Clipboard API trước
        if(navigator.clipboard && navigator.clipboard.writeText){
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Đã sao chép!");
            }).catch(() => fallbackCopy(textToCopy));
        } else {
            fallbackCopy(textToCopy);
        }
    };

    function fallbackCopy(text){
        // Tạo textarea tạm để copy
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            alert("Đã sao chép!");
        } catch(e){
            alert("Sao chép thất bại!");
        }
        document.body.removeChild(textarea);
    }
}


function copyMau(){
    navigator.clipboard.writeText(window.generatedText);
    alert("Đã sao chép!");
}

<script>
    function showHelp(){
    document.getElementById("helpOverlay").style.display = "flex";
    const v=document.getElementById("helpVideo");
    v.currentTime = 0;
    v.play();
}

function closeHelp(){

// ẨN CẢ 2 NÚT
function hideHelpBtnFunction(){
    document.getElementById("helpBtn").style.display = "none";
    document.getElementById("hideHelpBtn").style.display = "none";
}
   

let quizData = [];

function generateQuiz() {
    let text = document.getElementById("inputData").value.trim();

// XÓA ký tự "⸻"
text = text.replace(/⸻+/g, "");
// XÓA tất cả ký tự *, **, ***, ****
text = text.replace(/\*+/g, "");


// XÓA phần bị lặp (nhân đôi nội dung)
let half = Math.floor(text.length / 2);
let firstPart = text.slice(0, half).trim();
let secondPart = text.slice(half).trim();

if (secondPart.includes(firstPart.slice(0, 50))) {
    text = firstPart;
}

// XÓA toàn bộ nội dung sau "Đáp án:" của câu cuối cùng (nếu có)
let lastAnswerIndex = text.lastIndexOf("Đáp án:");
if (lastAnswerIndex !== -1) {
    let before = text.slice(0, lastAnswerIndex);
    let after = text.slice(lastAnswerIndex);
    let answerLine = after.split("\n")[0];
    text = before + answerLine;
}




    if (!text) return alert("Vui lòng nhập câu hỏi!");
    document.getElementById("goodLuckBox").style.display = "none";


    // 1. Tách tất cả các dòng và loại bỏ dòng trống
    const lines = text
    .split("\n")
    .map(l => l.trim())
    .filter(l => l !== "" && !/^-+$/g.test(l));
 // loại bỏ các dòng --- hoàn toàn
    // 🔥 Tự động xóa mọi thứ trước câu hỏi đầu tiên
// 🔥 Tự động xóa TẤT CẢ nội dung TRƯỚC câu hỏi đầu tiên
let firstQuestionIndex = lines.findIndex(l =>
    /^(Câu\s*\d+|Bài\s*\d+|\d+\s*[\).])\s*/i.test(l)
);

// Nếu tìm thấy Câu 1 / Bài 1 / 1. thì xóa toàn bộ đoạn trước đó
if (firstQuestionIndex > -1) {
    lines.splice(0, firstQuestionIndex);
}

// ⭐ Ghép "Câu 1" + dòng kế tiếp thành 1 dòng duy nhất
// ⭐ Gộp các dòng dạng "Câu 1:" + dòng câu hỏi phía sau
for (let i = 0; i < lines.length - 1; i++) {

    // Nếu dòng chỉ có "Câu 1", "Câu 2", "Câu 3"...
    if (/^Câu\s*\d+\s*:?$/i.test(lines[i])) {
        lines[i] = lines[i].replace(/:$/, "") + ": " + lines[i+1];
        lines.splice(i+1, 1);
        i--;
        continue;
    }

    // Nếu dạng "Câu 1" không có dấu ":" → thêm vào
    if (/^Câu\s*\d+$/i.test(lines[i])) {
        lines[i] = lines[i] + ": " + lines[i+1];
        lines.splice(i+1, 1);
        i--;
        continue;
    }

    // Nếu dạng "1." hoặc "1)"
    if (/^\d+\s*[\).]\s*$/i.test(lines[i])) {
        lines[i] = lines[i].replace(/[\).]\s*$/, "") + ": " + lines[i+1];
        lines.splice(i+1, 1);
        i--;
    }
}




    quizData = [];
    let errorList = [];
    let currentBlock = [];

    lines.forEach((line, idx) => {
    currentBlock.push(line);

    // Nếu dòng có "Đáp án:", coi như kết thúc 1 câu
    if (/^Đáp án[:\s]/i.test(line)) {
        let questionLine = currentBlock[0] || "";
        let options = currentBlock.slice(1, -1); // tất cả dòng trừ câu hỏi và đáp án
        let answerLine = currentBlock[currentBlock.length - 1];

        // Xử lý loại bỏ ký tự lạ __, --, **
        const cleanText = (text) => text.replace(/(__+|--+|\*\*+|~~+|@@+|!!+|,,+|;;+)/g, "").trim();


        questionLine = cleanText(questionLine);
        options = options.map(opt => cleanText(opt));
        let correctRaw = cleanText(answerLine.replace(/^Đáp án[:\s]*/i, ""));
        let correct = correctRaw.split(",").map(x => x.trim()); // ["A","B"]

        if (!correct) {
            errorList.push(quizData.length + 1);
        }

        // Xử lý A, B, C, D nếu có dấu : hoặc .
        let A = options[0] ? options[0].replace(/^A[:.]\s*/, "").trim() : "";
        let B = options[1] ? options[1].replace(/^B[:.]\s*/, "").trim() : "";
        let C = options[2] ? options[2].replace(/^C[:.]\s*/, "").trim() : "";
        let D = options[3] ? options[3].replace(/^D[:.]\s*/, "").trim() : "";

        quizData.push({
            question: questionLine,
            A, B, C, D,
            correct
        });

        currentBlock = []; // reset cho câu tiếp theo
    }
});


    if (errorList.length > 0) {
        document.getElementById("result").innerHTML = `
            <div class="wrong" style="background:#fff3cd; border-left:5px solid orange; color:black;">
                ⚠️ Lỗi nội dung ở câu số: ${errorList.join(', ')}. Vui lòng kiểm tra lại!
            </div>
        `;
        return;
    }

    document.getElementById("inputBox").style.display = "none";
    renderQuiz();
}


function renderQuiz(){
    const quizForm = document.getElementById("quizForm");
    quizForm.innerHTML="";

    quizData.forEach((q, idx)=>{
        let div = document.createElement("div");
        div.className="question";
        div.innerHTML = `
            <b>${q.question}</b><br><br>
            <label><input type="radio" name="q${idx}" value="A">A. ${q.A}</label>
            <label><input type="radio" name="q${idx}" value="B">B. ${q.B}</label>
            <label><input type="radio" name="q${idx}" value="C">C. ${q.C}</label>
            <label><input type="radio" name="q${idx}" value="D">D. ${q.D}</label>
        `;
        quizForm.appendChild(div);
    });

    document.getElementById("endBtn").style.display = "inline-block";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("newQuizBtn").style.display = "none";
    document.getElementById("result").innerHTML = "";
}

function submitQuiz(){
    const quizForm = document.getElementById("quizForm");
    const divs = quizForm.querySelectorAll(".question");

    let correctCount = 0;
    let wrongList = [];
    let missingAnswerList = []; // danh sách câu chưa có đáp án

    divs.forEach((div, idx)=>{
        let correctAns = quizData[idx].correct;
        const checked = div.querySelector("input[type=radio]:checked");

        // nếu không có đáp án, thêm vào danh sách missingAnswerList
        if(!correctAns) {
            missingAnswerList.push(idx+1); // lưu số thứ tự câu hỏi
            correctAns = "(Không có đáp án)";
        }

        // tô màu đỏ cho đáp án đúng nếu có
        if(correctAns !== "(Không có đáp án)"){
            let labels = div.querySelectorAll("label");
            labels.forEach(lb=>{
                let inp = lb.querySelector("input");
                if(inp.value === correctAns){
                    lb.style.color = "red";
                    lb.style.fontWeight = "bold";
                }
            });
        }

        if(checked && checked.value === correctAns){
            correctCount++;
        } else {
            wrongList.push({
                q: quizData[idx].question,
                chosen: checked ? checked.value : "(Không chọn)",
                correct: correctAns
            });
        }
    });

    let total = quizData.length;
    let percent = Math.round((correctCount/total)*100);
    let grade = Math.round(((correctCount/total)*10)*100)/100;

    let html = `
        <h3>🎯 Kết quả</h3>
        <p>👉 Đúng: <b>${correctCount}/${total}</b></p>
        <p>📊 Chính xác: <b>${percent}%</b></p>
        <p>🏆 Điểm: <b>${grade}/10</b></p>
    `;

    if(wrongList.length>0){
        html += `<h4>❗ Các câu sai</h4>`;
        wrongList.forEach((w,i)=>{
            html += `
                <div class="wrong">
                    <b>${w.q}</b><br>
                    ➤ Bạn chọn: <b>${w.chosen}</b><br>
                    ✔ Đáp án đúng: <b>${w.correct}</b>
                </div>`;
        });
    }

    // hiển thị cảnh báo câu chưa có đáp án
    if(missingAnswerList.length > 0){
        html += `<div class="wrong" style="background:#fff3cd; border-left:5px solid orange; color:black;">
            ⚠️ Câu hỏi chưa có đáp án: ${missingAnswerList.join(', ')}. Vui lòng thêm đáp án để chấm chính xác.
        </div>`;
    }

    document.getElementById("result").innerHTML = html;

    document.getElementById("retryBtn").style.display = "inline-block";
    document.getElementById("newQuizBtn").style.display = "inline-block";
    document.getElementById("endBtn").style.display = "none";
}


function retryQuiz(){
    renderQuiz();
}

function newQuiz(){
    quizData = [];
    document.getElementById("inputBox").style.display = "block";
     document.getElementById("goodLuckBox").style.display = "block"; // ✅ hiển thị lại khối tạo biểu mẫu
    document.getElementById("quizForm").innerHTML = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("endBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("newQuizBtn").style.display = "none";
    document.getElementById("inputData").value = "";
}

let currentIndex = 0;
let answersUser = {}; // lưu kết quả chọn

function renderSingleQuestion() {

</div>
`;
    

    </div>
        <div style="margin-top:20px; text-align:center;">
    <button type="button" onclick="restartToInput()" style="
        padding:10px 14px;
        font-size:18px;
        background:#e53935;
        color:white;
        border:none;

</div>
`;


    quizForm.appendChild(div);

    // Nếu đã chọn đáp án rồi (quay lại câu trước), thì khôi phục
    if (answersUser[currentIndex]) {

        let inp = div.querySelector(`input[value="${val}"]`);

    });

    showCorrectAnswer(true);
}
    // đổi nút nếu là câu cuối
let nextBtn = document.getElementById("nextBtn");
if (currentIndex === quizData.length - 1) {
    nextBtn.textContent = "Kết thúc";
} else {
    nextBtn.textContent = "Tiếp ➡";
}

}
function restartToInput() {
    quizData = [];
    answersUser = {};
    currentIndex = 0;

    // Hiện lại ô nhập câu hỏi
    document.getElementById("inputBox").style.display = "block";
    document.getElementById("goodLuckBox").style.display = "block";

    // Ẩn quiz + kết quả
    document.getElementById("quizForm").innerHTML = "";
    document.getElementById("result").innerHTML = "";

    document.getElementById("endBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("newQuizBtn").style.display = "none";
}


function confirmAnswer() {
    let div = document.querySelector(".question");
    let checkedInputs = div.querySelectorAll("input[name='qSingle']:checked");

    if (checkedInputs.length === 0) {
        alert("⚠️ Bạn chưa chọn đáp án!");
        return;
    }

    let selected = Array.from(checkedInputs).map(i => i.value);
    answersUser[currentIndex] = selected;

    showCorrectAnswer(false);
}


function showCorrectAnswer(isRestore = false) {
    let div = document.querySelector(".question");
    let labels = div.querySelectorAll("label");

    let userAns = answersUser[currentIndex] || [];
    let correctAns = quizData[currentIndex].correct;

    labels.forEach(lb => {
        let inp = lb.querySelector("input");
        lb.style.fontWeight = "normal";
        lb.style.color = "black";

        if (correctAns.includes(inp.value)) {
            lb.style.color = "green";
            lb.style.fontWeight = "bold";
        }

        if (userAns.includes(inp.value) && !correctAns.includes(inp.value)) {
            lb.style.color = "red";
            lb.style.fontWeight = "bold";
        }
    });

    let resultLine = document.getElementById("resultLine");

    let isCorrect = userAns.length === correctAns.length &&
        userAns.every(a => correctAns.includes(a));

    resultLine.textContent = isCorrect ? "✔ Đúng" : "✘ Sai";

    if (!isRestore) {
        document.getElementById("controlConfirm").style.display = "none";
        document.getElementById("controlNextPrev").style.display = "block";
    }
}


function nextQuestion() {
    if (currentIndex < quizData.length - 1) {
        currentIndex++;
        renderSingleQuestion();
    } else {
        endQuizSingle(); // Khi đến câu cuối thì kết thúc
    }
}


function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderSingleQuestion();
    }
}

// >>> KHI XONG TẤT CẢ CÂU <<<
function endQuizSingle() {
    let resultBox = document.getElementById("result");

    let correctCount = 0;
    if (Object.keys(answersUser).length === 0) return;

    quizData.forEach((q, i) => {
        let userAns = answersUser[i] || [];
let correctAns = q.correct;

let isCorrect = userAns.length === correctAns.length &&
    userAns.every(a => correctAns.includes(a));

if (isCorrect) correctCount++;
    });

    let total = quizData.length;
    let percent = Math.round((correctCount/total)*100);

    resultBox.innerHTML = `
        <div style="background:#fff;padding:10px;border-radius:6px;color:black;">
            🎯 Hoàn thành bài!<br>
            ➤ Đúng: <b>${correctCount}/${total}</b><br>
            📊 Chính xác: <b>${percent}%</b>
        </div>

        <button onclick="retrySingle()">🔄 Làm lại</button>
        <button onclick="newQuiz()">🆕 Tạo quiz khác</button>
    `;
}

function retrySingle() {
    currentIndex = 0;
    answersUser = {};

    // ẨN KHỐI KẾT QUẢ HOÀN THÀNH
    document.getElementById("result").innerHTML = "";

    renderSingleQuestion();
}



// ================= OVERRIDE ================
function renderQuiz() {
    currentIndex = 0;
    answersUser = {};
    
    document.getElementById("endBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("newQuizBtn").style.display = "none";

    renderSingleQuestion();
}

</script>
